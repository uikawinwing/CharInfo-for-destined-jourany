<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>亚斯特菈 - 角色档案</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --c-primary: #a61b1b; /* Deep Red */
        --c-primary-dim: #5c0e0e;
        --c-secondary: #2c3e50; /* Dark Blue-Grey */
        --c-accent: #f1c40f; /* Gold */
        --c-text: #ecf0f1;
        --c-text-muted: #bdc3c7;
        --c-bg-dark: rgba(10, 10, 12, 0.85);
        --c-panel-bg: rgba(20, 20, 25, 0.7);
        --c-border: rgba(255, 255, 255, 0.15);

        --font-header: 'Cinzel', serif;
        --font-body: 'Noto Sans SC', sans-serif;
        --font-tech: 'Orbitron', sans-serif;

        --glass-blur: blur(12px);
        --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #050505;
        font-family: var(--font-body);
        color: var(--c-text);
        display: flex;
      }

      /* === BACKGROUND LAYERS === */
      .bg-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        background-image: url('ComfyUI_temp_psqcx_00006_.png');
        background-size: cover;
        background-position: center;
        filter: blur(20px) brightness(0.3);
        transform: scale(1.1);
      }

      .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        background: radial-gradient(circle at 20% 50%, rgba(166, 27, 27, 0.1) 0%, transparent 50%);
      }

      /* === LAYOUT === */
      .layout-container {
        display: flex;
        width: 100%;
        height: 100%;
        max-width: 1920px;
        margin: 0 auto;
      }

      /* LEFT PANEL: PORTRAIT */
      .char-portrait-section {
        flex: 0 0 45%;
        height: 100%;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Mask to blend nicely */
        mask-image: linear-gradient(to right, black 80%, transparent 100%);
        -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
      }

      .char-img {
        height: 100%;
        width: 100%;
        object-fit: cover;
        object-position: center top;
        filter: drop-shadow(5px 0 20px rgba(0,0,0,0.5));
        transition: transform 0.5s ease;
      }

      .char-portrait-section:hover .char-img {
        transform: scale(1.02);
      }

      /* RIGHT PANEL: DATA */
      .char-data-section {
        flex: 1;
        height: 100%;
        overflow-y: auto;
        padding: 40px 60px;
        position: relative;
        background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 20%, rgba(0,0,0,0.8) 100%);
        scrollbar-width: thin;
        scrollbar-color: var(--c-primary) transparent;
      }

      .char-data-section::-webkit-scrollbar {
        width: 6px;
      }
      .char-data-section::-webkit-scrollbar-track {
        background: transparent;
      }
      .char-data-section::-webkit-scrollbar-thumb {
        background-color: var(--c-primary);
        border-radius: 3px;
      }

      /* === HEADER INFO === */
      .header-group {
        margin-bottom: 40px;
        border-bottom: 1px solid var(--c-border);
        padding-bottom: 20px;
        position: relative;
      }

      .header-group::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 100px;
        height: 3px;
        background: var(--c-primary);
        box-shadow: 0 0 10px var(--c-primary);
      }

      .level-tag {
        display: inline-flex;
        align-items: center;
        background: rgba(0,0,0,0.6);
        border: 1px solid var(--c-accent);
        color: var(--c-accent);
        padding: 4px 12px;
        font-family: var(--font-tech);
        font-size: 0.9rem;
        letter-spacing: 1px;
        margin-bottom: 10px;
        border-radius: 2px;
        clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
      }

      .char-name {
        font-family: var(--font-header);
        font-size: 4rem;
        margin: 0;
        line-height: 1;
        text-transform: uppercase;
        background: linear-gradient(to bottom, #fff, #bbb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
      }

      .char-meta {
        margin-top: 10px;
        font-size: 1.1rem;
        color: var(--c-text-muted);
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .char-meta span {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .meta-icon {
        width: 6px;
        height: 6px;
        background: var(--c-primary);
        transform: rotate(45deg);
      }

      /* === VITALS BARS === */
      .vitals-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .vital-card {
        background: var(--c-panel-bg);
        border: 1px solid var(--c-border);
        padding: 15px;
        border-radius: 4px;
        position: relative;
        overflow: hidden;
      }

      .vital-label {
        font-family: var(--font-tech);
        font-size: 0.8rem;
        color: var(--c-text-muted);
        margin-bottom: 5px;
        display: flex;
        justify-content: space-between;
      }

      .vital-value {
        font-family: var(--font-tech);
        font-size: 1.4rem;
        font-weight: bold;
      }

      .bar-bg {
        width: 100%;
        height: 4px;
        background: rgba(255,255,255,0.1);
        margin-top: 10px;
        border-radius: 2px;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        width: 100%; /* Dynamic in real app */
        background: #fff;
        box-shadow: 0 0 10px currentColor;
      }

      .vital-card.hp { --bar-color: #e74c3c; }
      .vital-card.hp .vital-value { color: #ff7675; }
      .vital-card.hp .bar-fill { background: var(--bar-color); color: var(--bar-color); }

      .vital-card.mp { --bar-color: #3498db; }
      .vital-card.mp .vital-value { color: #74b9ff; }
      .vital-card.mp .bar-fill { background: var(--bar-color); color: var(--bar-color); }

      .vital-card.sp { --bar-color: #f39c12; }
      .vital-card.sp .vital-value { color: #ffeaa7; }
      .vital-card.sp .bar-fill { background: var(--bar-color); color: var(--bar-color); }

      /* === ATTRIBUTES HEX === */
      /* Simplifying to grid for HTML/CSS stability */
      .attributes-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 40px;
        background: rgba(0,0,0,0.3);
        padding: 15px;
        border-radius: 50px;
        border: 1px solid rgba(255,255,255,0.05);
      }

      .attr-box {
        text-align: center;
        flex: 1;
        position: relative;
      }

      .attr-box:not(:last-child)::after {
        content: '';
        position: absolute;
        right: 0;
        top: 20%;
        height: 60%;
        width: 1px;
        background: rgba(255,255,255,0.1);
      }

      .attr-label {
        font-size: 0.8rem;
        color: var(--c-text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .attr-val {
        font-family: var(--font-header);
        font-size: 1.8rem;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 0 10px rgba(255,255,255,0.3);
      }

      /* === TABS === */
      .tabs-nav {
        display: flex;
        border-bottom: 2px solid rgba(255,255,255,0.1);
        margin-bottom: 30px;
      }

      .tab-btn {
        background: transparent;
        border: none;
        padding: 15px 30px;
        color: var(--c-text-muted);
        font-family: var(--font-header);
        font-size: 1.1rem;
        cursor: pointer;
        position: relative;
        transition: var(--transition);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .tab-btn:hover {
        color: #fff;
        background: rgba(255,255,255,0.05);
      }

      .tab-btn.active {
        color: var(--c-accent);
      }

      .tab-btn.active::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        height: 2px;
        background: var(--c-accent);
        box-shadow: 0 -2px 10px var(--c-accent);
      }

      /* === CONTENT GRIDS === */
      .content-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 15px;
      }

      .item-card {
        background: rgba(30, 30, 35, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
        border-left: 3px solid var(--c-text-muted);
        padding: 20px;
        border-radius: 0 4px 4px 0;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
      }

      .item-card:hover {
        transform: translateY(-2px);
        background: rgba(40, 40, 45, 0.8);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        border-color: rgba(255,255,255,0.3);
      }

      /* Rarity Colors */
      .item-card[data-rarity="传说"] { border-left-color: #e74c3c; }
      .item-card[data-rarity="传说"] .card-title { color: #ff7675; }

      .item-card[data-rarity="史诗"] { border-left-color: #9b59b6; }
      .item-card[data-rarity="史诗"] .card-title { color: #d2b4de; }

      .item-card[data-rarity="稀有"] { border-left-color: #3498db; }
      .item-card[data-rarity="稀有"] .card-title { color: #85c1e9; }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .card-title {
        font-family: var(--font-header);
        font-size: 1.2rem;
        font-weight: 700;
        margin: 0;
      }

      .card-type {
        font-size: 0.75rem;
        background: rgba(255,255,255,0.1);
        padding: 2px 6px;
        border-radius: 2px;
        text-transform: uppercase;
      }

      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 10px;
      }

      .tag {
        font-size: 0.7rem;
        color: #aaa;
        border: 1px solid rgba(255,255,255,0.1);
        padding: 1px 5px;
        border-radius: 2px;
      }

      .card-desc {
        font-size: 0.9rem;
        line-height: 1.5;
        color: #ddd;
      }

      .card-flavor {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed rgba(255,255,255,0.1);
        font-style: italic;
        font-size: 0.85rem;
        color: #888;
      }

      /* === STORY SECTION === */
      .story-block {
        background: rgba(0,0,0,0.4);
        padding: 25px;
        border: 1px solid rgba(255,255,255,0.05);
        line-height: 1.8;
        font-size: 1rem;
        color: #ddd;
        text-align: justify;
      }

      .story-section-title {
        color: var(--c-accent);
        font-family: var(--font-header);
        font-size: 1.4rem;
        margin-top: 30px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .story-section-title::before {
        content: '';
        display: block;
        width: 4px;
        height: 20px;
        background: var(--c-accent);
      }

      /* === TAB ANIMATION === */
      .tab-content {
        display: none;
        animation: fadeIn 0.4s ease;
      }

      .tab-content.active {
        display: block;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* === RESPONSIVE === */
      @media (max-width: 1024px) {
        .layout-container {
          flex-direction: column;
          overflow-y: auto;
        }

        .char-portrait-section {
          flex: 0 0 50vh;
          width: 100%;
          mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
          -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
        }

        .char-data-section {
          flex: 1;
          overflow: visible;
          background: #050505; /* Solid bg for readability on mobile scroll */
          padding: 20px;
        }

        .char-name {
          font-size: 2.5rem;
        }

        body {
          overflow: auto;
          height: auto;
          display: block;
        }

        .bg-layer {
          position: fixed;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background Elements -->
    <div class="bg-layer"></div>
    <div class="particles"></div>

    <div class="layout-container">
      <!-- Left: Portrait -->
      <section class="char-portrait-section">
        <img src="ComfyUI_temp_psqcx_00006_.png" alt="亚斯特菈" class="char-img" />
      </section>

      <!-- Right: Data -->
      <section class="char-data-section">
        <div class="header-group">
          <div class="level-tag" id="level-display">LV. 20</div>
          <h1 class="char-name" id="name-display">亚斯特菈</h1>
          <div class="char-meta">
            <span id="race-display">人类</span>
            <span class="meta-icon"></span>
            <span id="class-display">魔导骑士</span>
            <span class="meta-icon"></span>
            <span id="tier-display" style="color: var(--c-accent)">第五层级</span>
          </div>
        </div>

        <div class="vitals-container">
          <div class="vital-card hp">
            <div class="vital-label"><span>HP</span> <span id="hp-val">0</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 100%"></div></div>
          </div>
          <div class="vital-card mp">
            <div class="vital-label"><span>MP</span> <span id="mp-val">0</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 100%"></div></div>
          </div>
          <div class="vital-card sp">
            <div class="vital-label"><span>SP</span> <span id="sp-val">0</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 100%"></div></div>
          </div>
        </div>

        <div class="attributes-row" id="attributes-grid">
          <!-- Populated by JS -->
        </div>

        <nav class="tabs-nav">
          <button class="tab-btn active" onclick="switchTab('profile')">档案</button>
          <button class="tab-btn" onclick="switchTab('skills')">技能</button>
          <button class="tab-btn" onclick="switchTab('equipment')">装备</button>
          <button class="tab-btn" onclick="switchTab('backstory')">故事</button>
        </nav>

        <div id="tab-profile" class="tab-content active">
          <div id="profile-content" class="story-block"></div>
        </div>

        <div id="tab-skills" class="tab-content">
          <div id="skills-grid" class="content-grid"></div>
        </div>

        <div id="tab-equipment" class="tab-content">
          <div id="equipment-grid" class="content-grid"></div>
        </div>

        <div id="tab-backstory" class="tab-content">
          <div id="backstory-content" class="story-block"></div>
        </div>
      </section>
    </div>

    <!-- Data Source -->
    <script id="data-source" type="text/yaml">
<char_info>
姓名: 亚斯特菈
生命层级: 第五层级
等级: 20
种族: 人类
身份: 传说级冒险者, 赤色流星, 契约骑士
职业: 枪兵, 魔导骑士
性格: |
  表面粗鲁直率，实则心思细腻。
  对认定的同伴（dev）有着近乎偏执的保护欲。
  极度厌恶被束缚，崇尚绝对的自由意志。

  脸型偏尖，五官轮廓清晰，睫毛浓密，皮肤是健康的浅小麦色。
  鲜红直发束成高马尾，发尾触及肩胛。
  金红异色竖瞳，眼神锐利。
  右臂因长期使用重型臂铠，肌肉线条比左臂更为紧实明显，上臂内侧留有魔力反冲造成的淡粉色灼痕。
  左侧锁骨处有一道陈旧的贯穿伤疤。
  大腿圆润紧致，肌肉线条流畅不突兀。

  臂铠表面蚀刻着层叠的重力符文，手腕处延伸出辅助锁扣，用于在投掷长枪时承受极大的反作用力。

登神长阶:
  权能:
    - 名称: 权能·贯穿
      主动效果: 消耗25%最大MP与SP，消耗[攻击]与[动作]，本回合所有攻击获得[绝对命中]与[无视防御]特性，且无法被任何手段格挡或偏转。

背景故事: |
  边境冒险者，称号“赤色流星”。
  为了追求极致的投掷速度，花光积蓄给自己装上了昂贵的魔导辅助臂铠。

    </script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <script>
      // Tab Switching Logic
      window.switchTab = function(tabName) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        event.currentTarget.classList.add('active');
        document.getElementById(`tab-${tabName}`).classList.add('active');
      }

      // Parsing Helpers
      function cleanYaml(yamlStr) {
        if (!yamlStr) return '';
        return yamlStr.replace(/<char_info>|<\/char_info>/g, '').trim();
      }

      function getSmartArray(input) {
        if (!input) return [];
        if (Array.isArray(input)) return input;
        return String(input).split(/[,，]/).map(s => s.trim()).filter(s => s);
      }

      document.addEventListener('DOMContentLoaded', () => {
        const raw = document.getElementById('data-source').textContent;
        const data = jsyaml.load(cleanYaml(raw));

        if(data) render(data);
      });

      function render(data) {
        // Header
        setText('name-display', data.姓名);
        setText('level-display', `LV. ${data.等级 || '?'}`);
        setText('race-display', data.种族);
        setText('class-display', getSmartArray(data.职业).join(' / '));
        setText('tier-display', data.生命层级);

        // Vitals
        if (data.资源) {
            setText('hp-val', (data.资源.HP || 0).toLocaleString());
            setText('mp-val', (data.资源.MP || 0).toLocaleString());
            setText('sp-val', (data.资源.SP || 0).toLocaleString());
        }

        // Attributes
        const attrs = data.属性 || {};
        const attrGrid = document.getElementById('attributes-grid');
        const attrMap = { '力量': 'STR', '敏捷': 'AGI', '体质': 'CON', '智力': 'INT', '精神': 'SPR' };

        Object.entries(attrs).forEach(([key, val]) => {
            const label = attrMap[key] || key;
            const div = document.createElement('div');
            div.className = 'attr-box';
            div.innerHTML = `<div class="attr-label">${label}</div><div class="attr-val">${val}</div>`;
            attrGrid.appendChild(div);
        });

        // Profile
        const profileDiv = document.getElementById('profile-content');
        let profileHTML = '';
        if(data.性格) profileHTML += `<div class="story-section-title">性格</div><p>${data.性格.replace(/\n/g, '<br>')}</p>`;
        if(data.喜爱) profileHTML += `<div class="story-section-title">喜爱</div><p>${data.喜爱.replace(/\n/g, '<br>')}</p>`;
        if(data.外貌特质) profileHTML += `<div class="story-section-title">外貌特质</div><p>${data.外貌特质.replace(/\n/g, '<br>')}</p>`;
        if(data.衣物装饰) profileHTML += `<div class="story-section-title">衣物装饰</div><p>${data.衣物装饰.replace(/\n/g, '<br>')}</p>`;
        profileDiv.innerHTML = profileHTML;

        // Skills
        const skillsGrid = document.getElementById('skills-grid');
        (data.技能 || []).forEach(item => {
            skillsGrid.innerHTML += createCardHTML(item);
        });

        // Equipment
        const equipGrid = document.getElementById('equipment-grid');
        (data.装备 || []).forEach(item => {
            equipGrid.innerHTML += createCardHTML(item);
        });

        // Backstory
        if(data.背景故事) {
             document.getElementById('backstory-content').innerHTML = `<p>${data.背景故事.replace(/\n/g, '<br>')}</p>`;
        }
      }

      function setText(id, text) {
        const el = document.getElementById(id);
        if(el) el.textContent = text || '-';
      }

      function createCardHTML(item) {
        const tags = getSmartArray(item.标签).map(t => `<span class="tag">${t.replace(/[\[\]]/g,'')}</span>`).join('');
        return `
            <div class="item-card" data-rarity="${item.品质}">
                <div class="card-header">
                    <h3 class="card-title">${item.名称}</h3>
                    ${item.品质 ? `<span class="card-type" style="color:var(--c-accent)">${item.品质}</span>` : ''}
                </div>
                <div class="card-tags">${tags}</div>
                <div class="card-desc">
                    ${item.效果 ? `<strong style="color:var(--c-text-muted)">效果:</strong> ${item.效果}<br>` : ''}
                </div>
                ${item.描述 ? `<div class="card-flavor">${item.描述}</div>` : ''}
            </div>
        `;
      }
    </script>
  </body>
</html>
