<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIRP NPC Tarot Sigil Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --page-bg: #08090d;
        --panel-bg: rgba(14, 16, 23, 0.86);
        --panel-line: rgba(255, 255, 255, 0.12);
        --text: #f5f2ec;
        --muted: #b9b4aa;
        --soft: #7d766d;
        --tier-color: #ffd700;
        --tier-color-rgb: 255, 215, 0;
        --race-color: #c99a56;
        --race-color-rgb: 201, 154, 86;
        --accent-color: #9fb9ff;
        --accent-color-rgb: 159, 185, 255;
        --redraw-duration: 1.45s;
        --glow-alpha: 0.34;
        --line-alpha: 0.86;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 22% 16%, rgba(199, 154, 86, 0.12), transparent 26%),
          radial-gradient(circle at 82% 12%, rgba(86, 130, 180, 0.1), transparent 28%),
          linear-gradient(180deg, #101018 0%, var(--page-bg) 100%);
        color: var(--text);
        font-family:
          "Noto Sans SC",
          "Microsoft YaHei",
          system-ui,
          sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .app-shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 34px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(290px, 360px) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .editor-panel,
      .preview-panel {
        border: 1px solid var(--panel-line);
        border-radius: 8px;
        background: var(--panel-bg);
        box-shadow: 0 22px 54px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
      }

      .editor-panel {
        position: sticky;
        top: 18px;
        padding: 16px;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .panel-title {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.18rem;
        font-weight: 700;
        letter-spacing: 0;
      }

      .control-grid {
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      label {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-width: 0;
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.36);
        outline: none;
      }

      input,
      select {
        height: 38px;
        padding: 0 10px;
      }

      textarea {
        min-height: 72px;
        resize: vertical;
        padding: 10px;
        line-height: 1.45;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(var(--tier-color-rgb), 0.72);
        box-shadow: 0 0 0 3px rgba(var(--tier-color-rgb), 0.13);
      }

      .range-line {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      input[type="range"] {
        padding: 0;
        accent-color: var(--tier-color);
      }

      .tier-value {
        min-width: 42px;
        text-align: right;
        color: var(--tier-color);
        font-weight: 800;
      }

      .button-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 4px;
      }

      .action-button {
        min-height: 36px;
        border: 1px solid rgba(var(--tier-color-rgb), 0.45);
        border-radius: 6px;
        color: var(--text);
        background: rgba(var(--tier-color-rgb), 0.12);
        cursor: pointer;
        padding: 7px 12px;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .action-button:hover {
        transform: translateY(-1px);
        border-color: rgba(var(--tier-color-rgb), 0.85);
        background: rgba(var(--tier-color-rgb), 0.18);
      }

      .token-readout {
        display: grid;
        gap: 6px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.4;
      }

      .token-readout code {
        color: var(--tier-color);
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      .preview-panel {
        min-height: calc(100vh - 48px);
        display: grid;
        place-items: center;
        padding: clamp(14px, 3vw, 32px);
      }

      .flip-shell {
        width: min(100%, 680px);
        perspective: 1400px;
      }

      .card-face {
        width: 100%;
        transform-origin: center;
        animation: flip-face-in 0.48s cubic-bezier(0.2, 0.78, 0.22, 1) both;
      }

      .flip-shell.is-front .card-back-face,
      .flip-shell:not(.is-front) .card-front-face {
        display: none;
      }

      .npc-card {
        position: relative;
        width: 100%;
        overflow: hidden;
        border: 1px solid rgba(var(--tier-color-rgb), 0.36);
        border-radius: 8px;
        background:
          radial-gradient(circle at 50% 32%, rgba(var(--race-color-rgb), 0.16), transparent 35%),
          radial-gradient(circle at 50% 12%, rgba(var(--tier-color-rgb), 0.2), transparent 45%),
          linear-gradient(180deg, #1a1429 0%, #090810 100%);
        box-shadow:
          0 24px 58px rgba(0, 0, 0, 0.82),
          0 0 32px rgba(var(--tier-color-rgb), 0.17),
          inset 0 0 30px rgba(var(--tier-color-rgb), 0.055);
      }

      .npc-card::before,
      .npc-card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .npc-card::before {
        background-image:
          linear-gradient(90deg, transparent 96%, rgba(var(--tier-color-rgb), 0.08) 96%),
          linear-gradient(0deg, transparent 96%, rgba(var(--race-color-rgb), 0.07) 96%);
        background-size: 34px 34px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.76), transparent 64%);
      }

      .npc-card::after {
        border-radius: inherit;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          inset 0 0 58px rgba(0, 0, 0, 0.32);
      }

      .card-back {
        position: relative;
        min-height: min(76vh, 720px);
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(var(--tier-color-rgb), 0.42);
        border-radius: 8px;
        background:
          radial-gradient(circle at 50% 24%, rgba(var(--tier-color-rgb), 0.2), transparent 36%),
          radial-gradient(circle at 50% 58%, rgba(var(--race-color-rgb), 0.18), transparent 48%),
          linear-gradient(180deg, #17101f 0%, #08070d 100%);
        box-shadow:
          0 24px 58px rgba(0, 0, 0, 0.82),
          0 0 34px rgba(var(--tier-color-rgb), 0.17),
          inset 0 0 42px rgba(var(--tier-color-rgb), 0.07);
      }

      .card-back::before,
      .card-back::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .card-back::before {
        background:
          linear-gradient(90deg, transparent 96%, rgba(var(--tier-color-rgb), 0.08) 96%),
          linear-gradient(0deg, transparent 96%, rgba(var(--race-color-rgb), 0.07) 96%);
        background-size: 30px 30px;
        mask-image: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.9), transparent 74%);
      }

      .card-back::after {
        border-radius: inherit;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          inset 0 0 0 10px rgba(0, 0, 0, 0.1),
          inset 0 0 92px rgba(0, 0, 0, 0.48);
      }

      .geometry-frame {
        position: absolute;
        inset: 18px;
        z-index: 1;
        pointer-events: none;
      }

      .mini-motif {
        position: absolute;
        width: 64px;
        height: 64px;
        opacity: 0.62;
        filter: drop-shadow(0 0 8px rgba(var(--tier-color-rgb), 0.18));
      }

      .mini-motif svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .mini-motif svg * {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .motif-corner-tl {
        top: 0;
        left: 0;
      }

      .motif-corner-tr {
        top: 0;
        right: 0;
      }

      .motif-corner-bl {
        bottom: 0;
        left: 0;
      }

      .motif-corner-br {
        right: 0;
        bottom: 0;
      }

      .motif-side-left {
        top: 50%;
        left: 2px;
        transform: translateY(-50%);
      }

      .motif-side-right {
        top: 50%;
        right: 2px;
        transform: translateY(-50%);
      }

      .motif-top {
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
      }

      .motif-bottom {
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
      }

      .side-script {
        position: absolute;
        top: 96px;
        bottom: 96px;
        z-index: 1;
        display: flex;
        align-items: center;
        color: rgba(245, 242, 236, 0.34);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.24em;
        line-height: 1.7;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        pointer-events: none;
      }

      .side-script.left {
        left: 18px;
      }

      .side-script.right {
        right: 18px;
      }

      .back-content {
        position: relative;
        z-index: 2;
        width: min(100%, 520px);
        display: grid;
        justify-items: center;
        gap: 18px;
        padding: clamp(22px, 5vw, 42px);
        text-align: center;
      }

      .back-minor {
        color: rgba(245, 242, 236, 0.62);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .back-name {
        max-width: 100%;
        margin: 0;
        overflow-wrap: anywhere;
        font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
        font-size: clamp(2rem, 6vw, 4.2rem);
        line-height: 1;
        letter-spacing: 0;
        text-shadow:
          0 2px 0 rgba(0, 0, 0, 0.58),
          0 0 28px rgba(var(--tier-color-rgb), 0.28);
      }

      .back-sigil-mark {
        width: min(260px, 64vw);
        aspect-ratio: 1;
        filter:
          drop-shadow(0 0 8px rgba(var(--tier-color-rgb), 0.32))
          drop-shadow(0 0 22px rgba(var(--race-color-rgb), 0.2));
      }

      .back-sigil-mark svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .tarot-sigil-root.back-sigil-mark {
        width: min(320px, 68vw);
      }

      .back-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        color: rgba(245, 242, 236, 0.78);
        font-size: 0.92rem;
      }

      .flip-button,
      .back-button {
        min-height: 38px;
        border: 1px solid rgba(var(--tier-color-rgb), 0.58);
        border-radius: 999px;
        color: var(--text);
        background: rgba(var(--tier-color-rgb), 0.13);
        cursor: pointer;
        padding: 8px 16px;
        box-shadow: 0 0 18px rgba(var(--tier-color-rgb), 0.12);
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .flip-button:hover,
      .back-button:hover {
        transform: translateY(-1px);
        border-color: rgba(var(--tier-color-rgb), 0.86);
        background: rgba(var(--tier-color-rgb), 0.2);
      }

      .front-toolbar {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: center;
        padding: 14px 0 0;
      }

      .back-button {
        min-height: 32px;
        padding: 6px 12px;
        font-size: 0.84rem;
        background: rgba(0, 0, 0, 0.32);
      }

      .card-content {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 16px;
        padding: clamp(18px, 4vw, 34px);
      }

      .card-header {
        display: grid;
        justify-items: center;
        gap: 10px;
        text-align: center;
      }

      .level-badge {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 4px 14px;
        border: 1px solid rgba(var(--tier-color-rgb), 0.82);
        border-radius: 999px;
        color: var(--tier-color);
        background: rgba(0, 0, 0, 0.48);
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
        box-shadow: 0 0 18px rgba(var(--tier-color-rgb), 0.22);
      }

      .char-name {
        margin: 0;
        max-width: 100%;
        overflow-wrap: anywhere;
        font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
        text-shadow:
          0 2px 0 rgba(0, 0, 0, 0.52),
          0 0 22px rgba(var(--tier-color-rgb), 0.22);
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        color: rgba(245, 242, 236, 0.78);
        font-size: 0.94rem;
      }

      .meta-chip {
        min-height: 27px;
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.22);
      }

      .visual-stage {
        position: relative;
        display: grid;
        place-items: center;
        min-height: clamp(250px, 46vw, 380px);
        padding: 4px;
      }

      .front-side-motifs {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .front-side-motifs .mini-motif {
        width: 48px;
        height: 48px;
        opacity: 0.48;
      }

      .visual-stage::before {
        content: "";
        position: absolute;
        width: min(74%, 420px);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(var(--tier-color-rgb), var(--glow-alpha)), transparent 58%),
          radial-gradient(circle, rgba(var(--race-color-rgb), 0.18), transparent 68%);
        filter: blur(24px);
        opacity: 0.76;
      }

      .corner-frame {
        position: absolute;
        inset: 10px;
        pointer-events: none;
      }

      .corner-frame i {
        position: absolute;
        width: 58px;
        height: 58px;
        border-color: rgba(var(--tier-color-rgb), 0.52);
        border-style: solid;
      }

      .corner-frame i:nth-child(1) {
        left: 0;
        top: 0;
        border-width: 1px 0 0 1px;
      }

      .corner-frame i:nth-child(2) {
        right: 0;
        top: 0;
        border-width: 1px 1px 0 0;
      }

      .corner-frame i:nth-child(3) {
        left: 0;
        bottom: 0;
        border-width: 0 0 1px 1px;
      }

      .corner-frame i:nth-child(4) {
        right: 0;
        bottom: 0;
        border-width: 0 1px 1px 0;
      }

      .tarot-sigil-root {
        position: relative;
        z-index: 1;
        width: min(340px, 82vw);
        aspect-ratio: 1;
        color: var(--tier-color);
        filter:
          drop-shadow(0 0 7px rgba(var(--tier-color-rgb), 0.28))
          drop-shadow(0 0 16px rgba(var(--race-color-rgb), 0.16));
      }

      .tarot-sigil {
        display: block;
        width: 100%;
        height: 100%;
      }

      .geometry-sigil {
        display: block;
        width: 100%;
        height: 100%;
      }

      .geometry-core {
        stroke-width: 1.05;
        opacity: 0.9;
      }

      .geometry-fine {
        stroke-width: 0.62;
        opacity: 0.5;
      }

      .geometry-secondary {
        stroke: rgb(var(--race-color-rgb));
        stroke-width: 0.78;
        opacity: 0.68;
      }

      .geometry-accent {
        stroke: rgb(var(--accent-color-rgb));
        stroke-width: 0.78;
        opacity: 0.74;
      }

      .geometry-node {
        filter: drop-shadow(0 0 3px rgba(var(--tier-color-rgb), 0.45));
      }

      .base,
      .race,
      .role,
      .accent {
        display: none;
      }

      .base-orbital .base.base-orbital,
      .base-rectangular .base.base-rectangular,
      .base-floral .base.base-floral,
      .base-ritual .base.base-ritual,
      .base-weapon .base.base-weapon,
      .base-circuit .base.base-circuit,
      .race-human .race.race-human,
      .race-dragon .race.race-dragon,
      .race-elf .race.race-elf,
      .race-construct .race.race-construct,
      .race-abyss .race.race-abyss,
      .race-celestial .race.race-celestial,
      .race-beast .race.race-beast,
      .race-elemental .race.race-elemental,
      .role-occult .role.role-occult,
      .role-warrior .role.role-warrior,
      .role-noble .role.role-noble,
      .role-wanderer .role.role-wanderer,
      .role-healer .role.role-healer,
      .role-scholar .role.role-scholar,
      .role-assassin .role.role-assassin,
      .role-merchant .role.role-merchant,
      .accent-fire .accent.accent-fire,
      .accent-water .accent.accent-water,
      .accent-ice .accent.accent-ice,
      .accent-wind .accent.accent-wind,
      .accent-thunder .accent.accent-thunder,
      .accent-light .accent.accent-light,
      .accent-dark .accent.accent-dark,
      .accent-wood .accent.accent-wood {
        display: block;
      }

      .sigil-line {
        fill: none;
        stroke: rgb(var(--tier-color-rgb));
        stroke-width: 1.15;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: var(--line-alpha);
        vector-effect: non-scaling-stroke;
        stroke-dasharray: 720;
        stroke-dashoffset: 0;
      }

      .sigil-thin {
        stroke-width: 0.72;
        opacity: 0.58;
      }

      .race-line {
        stroke: rgb(var(--race-color-rgb));
        opacity: 0.76;
      }

      .role-line {
        stroke: rgb(var(--tier-color-rgb));
        opacity: 0.92;
      }

      .accent-line {
        stroke: rgb(var(--accent-color-rgb));
        opacity: 0.82;
      }

      .sigil-node {
        fill: rgb(var(--tier-color-rgb));
        opacity: 0.86;
        transform-origin: center;
        transform-box: fill-box;
      }

      .race-node {
        fill: rgb(var(--race-color-rgb));
      }

      .accent-node {
        fill: rgb(var(--accent-color-rgb));
      }

      .npc-card:hover .sigil-line,
      .card-back:hover .sigil-line,
      .preview-redraw .sigil-line {
        animation: sigil-redraw var(--redraw-duration) ease-out forwards;
      }

      .npc-card:hover .sigil-node,
      .card-back:hover .sigil-node,
      .preview-redraw .sigil-node {
        animation: sigil-node-pop 0.56s cubic-bezier(0.17, 0.89, 0.32, 1.49) both;
      }

      .npc-card:hover .sigil-node:nth-of-type(2n),
      .card-back:hover .sigil-node:nth-of-type(2n),
      .preview-redraw .sigil-node:nth-of-type(2n) {
        animation-delay: 0.08s;
      }

      .npc-card:hover .sigil-node:nth-of-type(3n),
      .card-back:hover .sigil-node:nth-of-type(3n),
      .preview-redraw .sigil-node:nth-of-type(3n) {
        animation-delay: 0.14s;
      }

      .race-construct .race-line {
        stroke-dasharray: 12 6;
      }

      .race-abyss .race-line,
      .role-assassin .role-line {
        stroke-dasharray: 18 9 4 9;
      }

      .race-dragon .race-line {
        stroke-dasharray: 900;
      }

      .base-circuit .base-line,
      .accent-thunder .accent-line {
        stroke-dasharray: 10 5;
      }

      .tier-1 {
        --redraw-duration: 0.95s;
        --glow-alpha: 0.1;
        --line-alpha: 0.62;
      }

      .tier-2 {
        --redraw-duration: 1.05s;
        --glow-alpha: 0.16;
        --line-alpha: 0.72;
      }

      .tier-3 {
        --redraw-duration: 1.2s;
        --glow-alpha: 0.22;
        --line-alpha: 0.82;
      }

      .tier-4 {
        --redraw-duration: 1.35s;
        --glow-alpha: 0.28;
        --line-alpha: 0.88;
      }

      .tier-5 {
        --redraw-duration: 1.45s;
        --glow-alpha: 0.34;
        --line-alpha: 0.94;
      }

      .tier-6 {
        --redraw-duration: 1.55s;
        --glow-alpha: 0.42;
        --line-alpha: 0.98;
      }

      .tier-7 {
        --redraw-duration: 1.7s;
        --glow-alpha: 0.5;
        --line-alpha: 1;
      }

      .tier-7 .outer-rotation {
        transform-origin: 60px 60px;
        animation: slow-turn 18s linear infinite;
      }

      .caption {
        display: grid;
        gap: 8px;
        text-align: center;
      }

      .caption-title {
        margin: 0;
        color: var(--tier-color);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.05rem, 2vw, 1.35rem);
        letter-spacing: 0;
      }

      .caption-text {
        margin: 0 auto;
        max-width: 52ch;
        color: rgba(245, 242, 236, 0.76);
        line-height: 1.58;
      }

      .attribute-flags {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .back-attribute-flags {
        width: min(100%, 500px);
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 7px;
      }

      .flag {
        position: relative;
        min-width: 0;
        min-height: 82px;
        display: grid;
        justify-items: center;
        align-content: start;
        gap: 5px;
        padding: 10px 5px 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-top: 2px solid rgb(var(--race-color-rgb));
        background: rgba(0, 0, 0, 0.26);
        clip-path: polygon(0 0, 100% 0, 100% 83%, 50% 100%, 0 83%);
      }

      .flag span {
        max-width: 100%;
        overflow-wrap: anywhere;
      }

      .flag-name {
        color: rgba(245, 242, 236, 0.82);
        font-size: 0.86rem;
        font-weight: 700;
      }

      .flag-value {
        color: #fff;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.35rem, 4vw, 2.1rem);
        line-height: 1;
        font-weight: 700;
        text-shadow: 0 0 14px rgba(var(--race-color-rgb), 0.34);
      }

      .back-attribute-flags .flag {
        min-height: 68px;
        padding: 8px 4px 17px;
        background:
          linear-gradient(180deg, rgba(var(--race-color-rgb), 0.12), rgba(0, 0, 0, 0.24)),
          rgba(0, 0, 0, 0.22);
        border-color: rgba(var(--tier-color-rgb), 0.18);
        border-top-color: rgb(var(--race-color-rgb));
      }

      .back-attribute-flags .flag-name {
        font-size: 0.74rem;
      }

      .back-attribute-flags .flag-value {
        font-size: clamp(1.2rem, 3.4vw, 1.72rem);
      }

      @keyframes sigil-redraw {
        0% {
          stroke-dashoffset: 720;
          opacity: 0.12;
        }

        100% {
          stroke-dashoffset: 0;
        }
      }

      @keyframes sigil-node-pop {
        0% {
          transform: scale(0);
          opacity: 0;
        }

        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes flip-face-in {
        0% {
          opacity: 0;
          transform: rotateY(-74deg) scale(0.985);
        }

        100% {
          opacity: 1;
          transform: rotateY(0deg) scale(1);
        }
      }

      @keyframes slow-turn {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }

      @media (max-width: 860px) {
        .app-shell {
          width: min(100% - 22px, 680px);
          padding-top: 12px;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .editor-panel {
          position: static;
        }

        .preview-panel {
          min-height: auto;
          padding: 10px;
        }
      }

      @media (max-width: 560px) {
        .field-row {
          grid-template-columns: 1fr;
        }

        .card-content {
          gap: 12px;
          padding: 16px 12px 18px;
        }

        .visual-stage {
          min-height: 250px;
        }

        .card-back {
          min-height: 620px;
        }

        .back-content {
          gap: 14px;
          padding: 18px 12px;
        }

        .back-sigil-mark {
          width: min(220px, 70vw);
        }

        .tarot-sigil-root.back-sigil-mark {
          width: min(240px, 74vw);
        }

        .tarot-sigil-root {
          width: min(250px, 84vw);
        }

        .corner-frame {
          inset: 7px;
        }

        .corner-frame i {
          width: 38px;
          height: 38px;
        }

        .attribute-flags {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .back-attribute-flags {
          grid-template-columns: repeat(5, minmax(0, 1fr));
          gap: 5px;
        }

        .flag {
          min-height: 74px;
        }

        .back-attribute-flags .flag {
          min-height: 58px;
          padding: 7px 3px 15px;
        }

        .geometry-frame {
          inset: 10px;
        }

        .mini-motif {
          width: 42px;
          height: 42px;
          opacity: 0.5;
        }

        .motif-side-left,
        .motif-side-right {
          display: none;
        }

        .side-script {
          display: none;
        }

        .meta-row {
          gap: 6px;
          font-size: 0.84rem;
        }
      }
    </style>

      function hexToRgb(hex) {
        const clean = hex.replace("#", "");
        const r = parseInt(clean.slice(0, 2), 16);
        const g = parseInt(clean.slice(2, 4), 16);
        const b = parseInt(clean.slice(4, 6), 16);
        return `${r}, ${g}, ${b}`;
      }

      function fillSelect(select, values, selected) {
        select.innerHTML = values
          .map(([value, label]) => `<option value="${value}"${value === selected ? " selected" : ""}>${label}</option>`)
          .join("");
      }

      function replay() {
        outputs.card.classList.remove("preview-redraw");
        outputs.cardBack.classList.remove("preview-redraw");
        void outputs.card.offsetWidth;
        void outputs.cardBack.offsetWidth;
        outputs.card.classList.add("preview-redraw");
        outputs.cardBack.classList.add("preview-redraw");
        window.setTimeout(() => {
          outputs.card.classList.remove("preview-redraw");
          outputs.cardBack.classList.remove("preview-redraw");
        }, 1800);
      }

      function parseAttributeFlags(value) {
        const fallback = [
          ["力量", "31"],
          ["敏捷", "27"],
          ["智识", "44"],
          ["意志", "39"],
          ["魅力", "52"],
        ];

        const entries = String(value || "")
          .split(/[,;，；\n]+/)
          .map(part => part.trim())
          .filter(Boolean)
          .map(part => {
            const pieces = part.split(/[:：=]/);
            if (pieces.length < 2) return null;
            const name = pieces.shift().trim();
            const number = pieces.join(":").trim();
            if (!name || !number) return null;
            return [name, number];
          })
          .filter(Boolean);

        return (entries.length ? entries : fallback).slice(0, 6);
      }

      function renderAttributeFlags(target, flags) {
        target.innerHTML = flags
          .map(([name, value]) => {
            const safeName = name.replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" })[char]);
            const safeValue = value.replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" })[char]);
            return `<div class="flag"><span class="flag-name">${safeName}</span><span class="flag-value">${safeValue}</span></div>`;
          })
          .join("");
      }

      function geometryPoint(radius, index, sides = 6, rotation = -90) {
        const angle = ((rotation + (360 / sides) * index) * Math.PI) / 180;
        return {
          x: Number((60 + Math.cos(angle) * radius).toFixed(2)),
          y: Number((60 + Math.sin(angle) * radius).toFixed(2)),
        };
      }

      function geometryPoints(radius, sides = 6, rotation = -90) {
        return Array.from({ length: sides }, (_item, index) => geometryPoint(radius, index, sides, rotation));
      }

      function pointList(points) {
        return points.map(point => `${point.x},${point.y}`).join(" ");
      }

      function line(a, b, className = "sigil-line geometry-fine") {
        return `<line class="${className}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" />`;
      }

      function poly(points, className = "sigil-line geometry-core") {
        return `<polygon class="${className}" points="${pointList(points)}" />`;
      }

      function node(point, radius = 1.45, className = "sigil-node geometry-node") {
        return `<circle class="${className}" cx="${point.x}" cy="${point.y}" r="${radius}" />`;
      }

      function starPoints(outerRadius, innerRadius, pointCount = 6, rotation = -90) {
        return Array.from({ length: pointCount * 2 }, (_item, index) => {
          const radius = index % 2 === 0 ? outerRadius : innerRadius;
          const angle = ((rotation + (360 / (pointCount * 2)) * index) * Math.PI) / 180;
          return {
            x: Number((60 + Math.cos(angle) * radius).toFixed(2)),
            y: Number((60 + Math.sin(angle) * radius).toFixed(2)),
          };
        });
      }

      function tierOuterShape(tier) {
        const t = Number(tier) || 1;
        if (t <= 1) {
          const points = geometryPoints(53, 3, -90);
          return {
            name: "triangle frame",
            points,
            markup: [poly(points, "sigil-line geometry-core"), poly(geometryPoints(35, 3, -90), "sigil-line geometry-fine")],
          };
        }

        if (t === 2) {
          const points = geometryPoints(52, 6, -90);
          return {
            name: "circle frame",
            points,
            markup: [
              `<circle class="sigil-line geometry-core" cx="60" cy="60" r="52" />`,
              `<circle class="sigil-line geometry-fine" cx="60" cy="60" r="38" />`,
            ],
          };
        }

        if (t === 3) {
          const points = geometryPoints(51, 4, -45);
          return {
            name: "diamond frame",
            points,
            markup: [poly(points, "sigil-line geometry-core"), poly(geometryPoints(36, 4, -45), "sigil-line geometry-fine")],
          };
        }

        if (t === 4) {
          const points = geometryPoints(52, 5, -90);
          return {
            name: "pentagon frame",
            points,
            markup: [
              poly(points, "sigil-line geometry-core"),
              poly(geometryPoints(39, 5, -90), "sigil-line geometry-fine"),
              `<circle class="sigil-line geometry-fine" cx="60" cy="60" r="45" />`,
            ],
          };
        }

        if (t === 5) {
          const points = geometryPoints(53, 6, -90);
          return {
            name: "hexagon frame",
            points,
            markup: [poly(points, "sigil-line geometry-core"), poly(geometryPoints(41, 6, -90), "sigil-line geometry-fine")],
          };
        }

        if (t === 6) {
          const points = starPoints(56, 34, 6, -90);
          return {
            name: "six-star frame",
            points,
            markup: [
              poly(points, "sigil-line geometry-core"),
              poly(geometryPoints(43, 6, -90), "sigil-line geometry-fine"),
              `<circle class="sigil-line geometry-fine" cx="60" cy="60" r="48" />`,
            ],
          };
        }

        const points = geometryPoints(54, 8, -90);
        return {
          name: "octagonal crown frame",
          points,
          markup: [
            poly(points, "sigil-line geometry-core"),
            poly(starPoints(49, 36, 8, -90), "sigil-line geometry-fine"),
            `<circle class="sigil-line geometry-fine outer-rotation" cx="60" cy="60" r="55" stroke-dasharray="2 7" />`,
          ],
        };
      }

      function buildGeometrySigil({ base, race, role, accent, tier }) {
        const tierShape = tierOuterShape(tier);
        const hexOuter = geometryPoints(53, 6, -90);
        const mid = geometryPoints(41, 6, -90);
        const inner = geometryPoints(27, 6, -90);
        const rotated = geometryPoints(41, 6, -60);
        const square = geometryPoints(34, 4, -45);
        const oct = geometryPoints(48, 8, -90);
        const center = { x: 60, y: 60 };
        const density = Math.min(5, Math.max(1, Number(tier) - 1));
        const parts = [];

        parts.push('<svg class="geometry-sigil" viewBox="0 0 120 120" role="img">');
        tierShape.markup.forEach(item => parts.push(item));
        if (tier >= 4) parts.push(poly(rotated, "sigil-line geometry-fine"));

        tierShape.points.forEach((point, index) => {
          parts.push(line(point, center, "sigil-line geometry-fine"));
          if (tierShape.points.length > 4) parts.push(line(point, tierShape.points[(index + 2) % tierShape.points.length], "sigil-line geometry-fine"));
        });

        hexOuter.forEach((point, index) => {
          if (index % 2 === 0 || density >= 3) parts.push(line(point, center, "sigil-line geometry-fine"));
        });

        for (let index = 0; index < density; index += 1) {
          parts.push(line(mid[index], mid[(index + 3) % 6], "sigil-line geometry-fine"));
        }

        if (base === "orbital") {
          parts.push(`<ellipse class="sigil-line geometry-secondary" cx="60" cy="60" rx="48" ry="16" />`);
          parts.push(`<ellipse class="sigil-line geometry-secondary" cx="60" cy="60" rx="16" ry="48" transform="rotate(60 60 60)" />`);
          parts.push(poly(inner, "sigil-line geometry-accent"));
        } else if (base === "rectangular") {
          parts.push(poly(square, "sigil-line geometry-secondary"));
          parts.push(poly(geometryPoints(45, 4, 0), "sigil-line geometry-fine"));
          square.forEach((point, index) => parts.push(line(point, square[(index + 2) % 4], "sigil-line geometry-fine")));
        } else if (base === "floral") {
          parts.push(poly(oct, "sigil-line geometry-secondary"));
          oct.forEach((point, index) => parts.push(line(point, oct[(index + 3) % 8], index % 2 ? "sigil-line geometry-fine" : "sigil-line geometry-accent")));
        } else if (base === "ritual") {
          parts.push(poly([hexOuter[0], hexOuter[2], hexOuter[4]], "sigil-line geometry-secondary"));
          parts.push(poly([hexOuter[1], hexOuter[3], hexOuter[5]], "sigil-line geometry-secondary"));
          parts.push(`<circle class="sigil-line geometry-fine" cx="60" cy="60" r="18" />`);
        } else if (base === "weapon") {
          parts.push(line(hexOuter[0], hexOuter[3], "sigil-line geometry-core"));
          parts.push(line(hexOuter[1], hexOuter[4], "sigil-line geometry-secondary"));
          parts.push(line(hexOuter[2], hexOuter[5], "sigil-line geometry-secondary"));
          parts.push(poly([inner[0], inner[2], inner[3], inner[4]], "sigil-line geometry-accent"));
        } else if (base === "circuit") {
          const grid = [
            [{ x: 34, y: 42 }, { x: 50, y: 42 }, { x: 50, y: 32 }],
            [{ x: 70, y: 32 }, { x: 70, y: 48 }, { x: 86, y: 48 }],
            [{ x: 34, y: 78 }, { x: 50, y: 78 }, { x: 50, y: 62 }, { x: 70, y: 62 }, { x: 70, y: 78 }, { x: 86, y: 78 }],
          ];
          grid.forEach(points => parts.push(`<polyline class="sigil-line geometry-secondary" points="${pointList(points)}" />`));
          parts.push(`<rect class="sigil-line geometry-accent" x="51" y="51" width="18" height="18" rx="1.5" />`);
        }

        if (race === "dragon") {
          parts.push(`<polyline class="sigil-line race-line" points="${pointList([hexOuter[4], inner[5], center, inner[1], hexOuter[2]])}" />`);
          parts.push(line(mid[5], hexOuter[0], "sigil-line race-line"));
          parts.push(line(mid[1], hexOuter[0], "sigil-line race-line"));
        } else if (race === "elf") {
          parts.push(poly(geometryPoints(36, 3, -90), "sigil-line race-line"));
          parts.push(poly(geometryPoints(36, 3, 90), "sigil-line race-line"));
        } else if (race === "construct") {
          parts.push(`<polyline class="sigil-line race-line" points="28,60 46,60 46,46 60,46 60,28" />`);
          parts.push(`<polyline class="sigil-line race-line" points="92,60 74,60 74,74 60,74 60,92" />`);
        } else if (race === "abyss") {
          parts.push(poly([hexOuter[3], inner[1], inner[5]], "sigil-line race-line"));
          parts.push(`<path class="sigil-line race-line" d="M32 88 L43 76 M88 88 L77 76" />`);
        } else if (race === "celestial") {
          hexOuter.forEach((point, index) => {
            if (index % 2 === 0) parts.push(line(point, center, "sigil-line race-line"));
          });
          parts.push(`<circle class="sigil-line race-line" cx="60" cy="60" r="35" stroke-dasharray="2 6" />`);
        } else if (race === "beast") {
          parts.push(line({ x: 38, y: 30 }, { x: 52, y: 92 }, "sigil-line race-line"));
          parts.push(line({ x: 60, y: 28 }, { x: 60, y: 94 }, "sigil-line race-line"));
          parts.push(line({ x: 82, y: 30 }, { x: 68, y: 92 }, "sigil-line race-line"));
        } else if (race === "elemental") {
          parts.push(`<polyline class="sigil-line race-line" points="60,25 74,54 63,54 76,94 46,58 58,58 44,26" />`);
        } else {
          parts.push(poly(inner, "sigil-line race-line"));
        }

        if (role === "noble") {
          parts.push(`<polyline class="sigil-line role-line" points="40,72 48,47 56,60 60,38 64,60 72,47 80,72" />`);
        } else if (role === "warrior") {
          parts.push(line({ x: 38, y: 36 }, { x: 82, y: 84 }, "sigil-line role-line"));
          parts.push(line({ x: 82, y: 36 }, { x: 38, y: 84 }, "sigil-line role-line"));
        } else if (role === "occult") {
          parts.push(poly([inner[0], inner[2], inner[4]], "sigil-line role-line"));
          parts.push(poly([inner[1], inner[3], inner[5]], "sigil-line role-line"));
        } else if (role === "scholar") {
          parts.push(`<rect class="sigil-line role-line" x="42" y="42" width="36" height="36" rx="1" />`);
          parts.push(line({ x: 60, y: 42 }, { x: 60, y: 78 }, "sigil-line role-line"));
        } else if (role === "merchant") {
          parts.push(line({ x: 60, y: 35 }, { x: 60, y: 86 }, "sigil-line role-line"));
          parts.push(line({ x: 39, y: 50 }, { x: 81, y: 50 }, "sigil-line role-line"));
          parts.push(`<circle class="sigil-line role-line" cx="48" cy="73" r="8" />`);
          parts.push(`<circle class="sigil-line role-line" cx="72" cy="73" r="8" />`);
        } else if (role === "assassin") {
          parts.push(`<polyline class="sigil-line role-line" points="73,30 82,39 55,82 42,91 49,74" />`);
        } else if (role === "healer") {
          parts.push(`<circle class="sigil-line role-line" cx="60" cy="60" r="14" />`);
          parts.push(line({ x: 60, y: 42 }, { x: 60, y: 78 }, "sigil-line role-line"));
          parts.push(line({ x: 42, y: 60 }, { x: 78, y: 60 }, "sigil-line role-line"));
        } else if (role === "wanderer") {
          parts.push(poly(geometryPoints(30, 4, -90), "sigil-line role-line"));
          parts.push(line({ x: 60, y: 30 }, { x: 82, y: 60 }, "sigil-line role-line"));
        }

        if (accent !== "none") {
          const accentPoints = geometryPoints(14 + tier * 2, 6, -30);
          parts.push(poly(accentPoints, "sigil-line accent-line geometry-accent"));
        }

        tierShape.points.forEach(point => parts.push(node(point, tier >= 5 ? 1.65 : 1.35, "sigil-node race-node geometry-node")));
        mid.forEach((point, index) => {
          if (index % 2 === 0 || tier >= 5) parts.push(node(point, 1.15, "sigil-node geometry-node"));
        });
        parts.push(node(center, 2.4, "sigil-node accent-node geometry-node"));
        parts.push("</svg>");
        return parts.join("");
      }

      function motifSvg(type, strokeClass = "sigil-line geometry-secondary") {
        const stroke = type === "accent" ? "sigil-line geometry-accent" : strokeClass;
        const motif = [];
        motif.push('<svg viewBox="0 0 64 64">');
        if (type === "hex-lattice") {
          motif.push(`<polygon class="${stroke}" points="32,5 55,18 55,46 32,59 9,46 9,18" />`);
          motif.push(`<polygon class="sigil-line geometry-fine" points="32,12 49,22 49,42 32,52 15,42 15,22" />`);
          motif.push(`<line class="sigil-line geometry-fine" x1="32" y1="5" x2="32" y2="59" />`);
          motif.push(`<line class="sigil-line geometry-fine" x1="9" y1="18" x2="55" y2="46" />`);
          motif.push(`<line class="sigil-line geometry-fine" x1="55" y1="18" x2="9" y2="46" />`);
        } else if (type === "star") {
          motif.push(`<polygon class="${stroke}" points="32,6 39,24 58,24 43,36 49,56 32,44 15,56 21,36 6,24 25,24" />`);
          motif.push(`<polygon class="sigil-line geometry-fine" points="32,16 46,48 14,48" />`);
          motif.push(`<polygon class="sigil-line geometry-fine" points="32,52 18,20 50,20" />`);
        } else if (type === "flower") {
          motif.push(`<circle class="${stroke}" cx="32" cy="32" r="25" />`);
          [0, 60, 120, 180, 240, 300].forEach(angle => {
            motif.push(`<ellipse class="sigil-line geometry-fine" cx="32" cy="32" rx="10" ry="24" transform="rotate(${angle} 32 32)" />`);
          });
        } else if (type === "diamond") {
          motif.push(`<polygon class="${stroke}" points="32,5 58,32 32,59 6,32" />`);
          motif.push(`<polygon class="sigil-line geometry-fine" points="32,14 49,32 32,50 15,32" />`);
          motif.push(`<line class="sigil-line geometry-fine" x1="32" y1="5" x2="32" y2="59" />`);
          motif.push(`<line class="sigil-line geometry-fine" x1="6" y1="32" x2="58" y2="32" />`);
        } else if (type === "cube") {
          motif.push(`<polygon class="${stroke}" points="32,7 54,20 54,44 32,57 10,44 10,20" />`);
          motif.push(`<polyline class="sigil-line geometry-fine" points="32,7 32,32 54,20" />`);
          motif.push(`<polyline class="sigil-line geometry-fine" points="32,32 10,20" />`);
          motif.push(`<polyline class="sigil-line geometry-fine" points="32,32 32,57" />`);
        } else if (type === "triangle") {
          motif.push(`<polygon class="${stroke}" points="32,5 58,55 6,55" />`);
          motif.push(`<polygon class="sigil-line geometry-fine" points="32,18 47,47 17,47" />`);
          motif.push(`<line class="sigil-line geometry-fine" x1="32" y1="5" x2="32" y2="55" />`);
        } else if (type === "rings") {
          motif.push(`<circle class="${stroke}" cx="32" cy="32" r="25" />`);
          motif.push(`<circle class="sigil-line geometry-fine" cx="32" cy="32" r="16" />`);
          motif.push(`<circle class="sigil-line geometry-fine" cx="32" cy="32" r="7" />`);
          motif.push(`<polygon class="sigil-line geometry-accent" points="32,8 53,44 11,44" />`);
        } else {
          motif.push(`<polygon class="${stroke}" points="32,6 56,32 32,58 8,32" />`);
          motif.push(`<polygon class="sigil-line geometry-fine" points="32,12 50,32 32,52 14,32" />`);
        }
        motif.push(`<circle class="sigil-node geometry-node" cx="32" cy="32" r="1.8" />`);
        motif.push("</svg>");
        return motif.join("");
      }

      function selectMotifs({ base, race, role, accent }) {
        const baseMap = {
          orbital: "rings",
          rectangular: "diamond",
          floral: "flower",
          ritual: "star",
          weapon: "triangle",
          circuit: "cube",
        };
        const raceMap = {
          dragon: "hex-lattice",
          elf: "flower",
          construct: "cube",
          abyss: "triangle",
          celestial: "star",
          beast: "diamond",
          elemental: "rings",
          human: "hex-lattice",
        };
        const roleMap = {
          noble: "star",
          warrior: "triangle",
          occult: "rings",
          wanderer: "diamond",
          healer: "flower",
          scholar: "cube",
          assassin: "triangle",
          merchant: "hex-lattice",
        };
        return [
          baseMap[base] || "hex-lattice",
          raceMap[race] || "diamond",
          roleMap[role] || "rings",
          accent === "wood" ? "flower" : accent === "thunder" ? "triangle" : accent === "ice" ? "diamond" : "rings",
          "hex-lattice",
          "star",
          "cube",
          "flower",
        ];
      }

      function renderFrameMotifs(target, tokens, compact = false) {
        const slots = compact
          ? ["motif-corner-tl", "motif-corner-tr", "motif-corner-bl", "motif-corner-br"]
          : ["motif-corner-tl", "motif-corner-tr", "motif-corner-bl", "motif-corner-br", "motif-side-left", "motif-side-right", "motif-top", "motif-bottom"];
        const motifs = selectMotifs(tokens);
        target.innerHTML = slots
          .map((slot, index) => `<div class="mini-motif ${slot}">${motifSvg(motifs[index % motifs.length], index % 3 === 0 ? "sigil-line geometry-accent" : "sigil-line geometry-secondary")}</div>`)
          .join("");
      }

      function setFrontVisible(isVisible) {
        outputs.flipShell.classList.toggle("is-front", isVisible);
        if (isVisible) {
          outputs.card.querySelector("#hideBtn").focus();
        } else {
          outputs.cardBack.focus();
        }
        replay();
      }

      function applyState(shouldReplay = false) {
        const tier = Number(ids.tier.value || 1);
        const base = ids.base.value;
        const race = ids.race.value;
        const role = ids.role.value;
        const accent = ids.accent.value;

        const tierHex = tierColors[tier] || tierColors[1];
        const raceHex = raceColors[race] || raceColors.human;
        const accentHex = accentColors[accent] || accentColors.light;

        document.documentElement.style.setProperty("--tier-color", tierHex);
        document.documentElement.style.setProperty("--tier-color-rgb", hexToRgb(tierHex));
        document.documentElement.style.setProperty("--race-color", raceHex);
        document.documentElement.style.setProperty("--race-color-rgb", hexToRgb(raceHex));
        document.documentElement.style.setProperty("--accent-color", accentHex);
        document.documentElement.style.setProperty("--accent-color-rgb", hexToRgb(accentHex));

        outputs.card.className = `npc-card card-face card-front-face tier-${tier}`;
        outputs.cardBack.className = `card-back card-face card-back-face tier-${tier}`;
        outputs.sigil.className = `tarot-sigil-root base-${base} race-${race} role-${role} accent-${accent} tier-${tier}`;
        outputs.backSigil.className = `tarot-sigil-root back-sigil-mark base-${base} race-${race} role-${role} accent-${accent} tier-${tier}`;
        const geometryMarkup = buildGeometrySigil({ base, race, role, accent, tier });
        outputs.sigil.innerHTML = geometryMarkup;
        outputs.backSigil.innerHTML = geometryMarkup;

        const name = ids.name.value || "未命名";
        const raceLabel = ids.raceLabel.value || race;
        const roleLabel = ids.roleLabel.value || role;
        const flags = parseAttributeFlags(ids.attrs.value);
        const tierFrame = tierOuterShape(tier).name;

        outputs.name.textContent = name;
        outputs.backName.textContent = name;
        outputs.level.textContent = `Lv.${ids.level.value || "?"}`;
        outputs.race.textContent = raceLabel;
        outputs.backRace.textContent = raceLabel;
        outputs.role.textContent = roleLabel;
        outputs.backRole.textContent = roleLabel;
        outputs.tier.textContent = tierNames[tier];
        outputs.backTier.textContent = tierNames[tier];
        outputs.tierValue.textContent = tier;
        outputs.hook.textContent = ids.hook.value || "这个角色暂时还没有钩子句。";
        outputs.caption.textContent = `${tierFrame} / ${race} material / ${role} core`;
        outputs.combo.textContent = `outer=${tierFrame} / base-${base} / race-${race} / role-${role} / accent-${accent}`;
        outputs.color.textContent = `${tierHex} / ${raceHex} / ${accentHex}`;
        renderAttributeFlags(outputs.frontFlags, flags);
        renderAttributeFlags(outputs.backFlags, flags);
        renderFrameMotifs(outputs.backFrame, { base, race, role, accent }, false);
        renderFrameMotifs(outputs.frontFrame, { base, race, role, accent }, true);
        outputs.leftScript.textContent = `${base} / ${race} / ${accent}`;
        outputs.rightScript.textContent = `${role} / ${tierNames[tier]} / Lv.${ids.level.value || "?"}`;

        if (shouldReplay) replay();
      }

      function setSample(sample) {
        ids.name.value = sample.name;
        ids.level.value = sample.level;
        ids.raceLabel.value = sample.raceLabel;
        ids.roleLabel.value = sample.roleLabel;
        ids.base.value = sample.base;
        ids.race.value = sample.race;
        ids.role.value = sample.role;
        ids.accent.value = sample.accent;
        ids.tier.value = sample.tier;
        ids.hook.value = sample.hook;
        ids.attrs.value = sample.attrs;
        applyState(true);
      }

      function randomize() {
        const pick = group => group[Math.floor(Math.random() * group.length)][0];
        ids.base.value = pick(options.base);
        ids.race.value = pick(options.race);
        ids.role.value = pick(options.role);
        ids.accent.value = pick(options.accent);
        ids.tier.value = String(Math.floor(Math.random() * 7) + 1);
        applyState(true);
      }

      fillSelect(ids.base, options.base, "orbital");
      fillSelect(ids.race, options.race, "human");
      fillSelect(ids.role, options.role, "noble");
      fillSelect(ids.accent, options.accent, "light");

      Object.values(ids).forEach(input => input.addEventListener("input", () => applyState()));
      document.getElementById("redrawBtn").addEventListener("click", replay);
      document.getElementById("randomizeBtn").addEventListener("click", randomize);
      document.getElementById("sampleKnightBtn").addEventListener("click", () => setSample(samples.knight));
      document.getElementById("sampleMageBtn").addEventListener("click", () => setSample(samples.mage));
      document.getElementById("sampleConstructBtn").addEventListener("click", () => setSample(samples.construct));
      document.getElementById("revealBtn").addEventListener("click", event => {
        event.stopPropagation();
        setFrontVisible(true);
      });
      document.getElementById("hideBtn").addEventListener("click", () => setFrontVisible(false));
      outputs.cardBack.addEventListener("click", () => setFrontVisible(true));
      outputs.cardBack.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          setFrontVisible(true);
        }
      });

      applyState(true);
    </script>
  </body>
</html>
